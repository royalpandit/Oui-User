org.gradle.jvmargs=-Xmx1536M
android.useAndroidX=true
android.enableJetifier=true

# Workaround for Kotlin incremental compilation failing when sources are on a different drive than Gradle cache.
# See: https://youtrack.jetbrains.com/issue/KT-49128 (different root drives for incremental caches)
kotlin.incremental=false
kotlin.compiler.execution.strategy=in-process
